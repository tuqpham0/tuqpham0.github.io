    content:
      - layout: left
        border: weak  # Value of `weak` will display a weak border below this item. # Any 
                      # other value (or no value) means no border will be displayed
        title: Bregman Kd-trees
        link: tuqpham0.github.io/BANN
        link_text: BANN Package
        additional_links:
          - title: GitHub Repository for BANN
            icon: fab fa-github
            url: tuqpham0.github.com/BANN
          - title:  PyPI page for BANN
            icon: fab fa-python
            url: https://pypi.org/project/BANN/
        quote: >
          An efficient tool for computing (approximate) nearest neighbors with decomposable Bregman divergences. It also permits efficient algorithms for computing the Bregman--Hausdorff divergence.
        description: | # this will include new lines to allow paragraphs
          An extension of the kd-tree data structures for decomposable Bregman divergences. Despite often being assymmetric and never satisfy the triangle inequality, Bregman geometries admit a well-behaved geometry. This allows us to extend the Kd-tree beyond metric spaces and develop efficient algorithms.
          
          This work is done in collaboration with Dr. Hubert Wagner, and built off of the ANN package made by Arya and Mount.
