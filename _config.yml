about_content: | # this will include new lines to allow paragraphs
  I am a PhD student in mathematics at the University of Florida. My research focuses on computational topology and geometry, with applications to machine learning.
  My current project focuses on creating efficient algorithms and data structures for working with Bregman divergences, a family of dissimilarity measures used in machine learning and data analysis, and their induced geometries.

  I have also worked on projects in computational topology, including an algorithm for computing generators of persistent homology.

